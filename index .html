<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>一級棒鎖印行 & 瓊瑤打字行</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #c8922a;
      --gold-light: #e8b84b;
      --gold-pale: #f5e6c0;
      --dark: #1a1208;
      --ink: #2c1f0a;
      --paper: #faf6ee;
      --paper-dark: #f0e8d4;
      --red: #8b1a1a;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Background texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(200,146,42,0.04) 40px, rgba(200,146,42,0.04) 41px),
        repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(200,146,42,0.04) 40px, rgba(200,146,42,0.04) 41px);
      pointer-events: none;
      z-index: 0;
    }

    /* ── HEADER ── */
    header {
      position: relative;
      z-index: 1;
      background: linear-gradient(160deg, var(--dark) 0%, #2e1c08 60%, #3d2510 100%);
      padding: 3rem 1.5rem 2.5rem;
      text-align: center;
      overflow: hidden;
    }

    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(200,146,42,0.18) 0%, transparent 70%);
    }

    .seal-ring {
      position: absolute;
      top: -60px; right: -60px;
      width: 200px; height: 200px;
      border-radius: 50%;
      border: 3px solid rgba(200,146,42,0.2);
      box-shadow: 0 0 0 12px rgba(200,146,42,0.07), 0 0 0 24px rgba(200,146,42,0.04);
    }
    .seal-ring-2 {
      position: absolute;
      bottom: -80px; left: -80px;
      width: 260px; height: 260px;
      border-radius: 50%;
      border: 2px solid rgba(200,146,42,0.12);
    }

    .header-badge {
      display: inline-block;
      font-family: 'Noto Serif TC', serif;
      font-size: 0.7rem;
      letter-spacing: 0.35em;
      color: var(--gold-light);
      text-transform: uppercase;
      border: 1px solid rgba(200,146,42,0.4);
      padding: 0.35rem 1.2rem;
      border-radius: 2px;
      margin-bottom: 1.4rem;
      position: relative;
    }

    h1 {
      font-family: 'Noto Serif TC', serif;
      font-weight: 900;
      font-size: clamp(1.8rem, 6vw, 3.2rem);
      color: #fff;
      line-height: 1.25;
      position: relative;
      letter-spacing: 0.05em;
    }

    h1 span {
      color: var(--gold-light);
    }

    .divider-ornament {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
      margin: 1.2rem auto;
    }
    .divider-ornament::before,
    .divider-ornament::after {
      content: '';
      height: 1px;
      width: 60px;
      background: linear-gradient(to right, transparent, var(--gold));
    }
    .divider-ornament::after {
      background: linear-gradient(to left, transparent, var(--gold));
    }
    .diamond {
      width: 6px; height: 6px;
      background: var(--gold-light);
      transform: rotate(45deg);
    }

    .subtitle {
      font-family: 'Noto Serif TC', serif;
      font-size: clamp(0.85rem, 2.5vw, 1rem);
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.12em;
    }

    /* ── MAIN ── */
    main {
      position: relative;
      z-index: 1;
      max-width: 680px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 4rem;
    }

    /* ── SECTION TITLE ── */
    .section-title {
      font-family: 'Noto Serif TC', serif;
      font-size: 0.75rem;
      letter-spacing: 0.35em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, var(--gold-pale), transparent);
    }

    /* ── SOCIAL LINKS ── */
    .links-grid {
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      margin-bottom: 2.5rem;
    }

    .link-card {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: #fff;
      border: 1px solid var(--paper-dark);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      text-decoration: none;
      color: var(--ink);
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    .link-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: var(--brand-color, var(--gold));
      border-radius: 4px 0 0 4px;
    }

    .link-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
      border-color: var(--brand-color, var(--gold));
    }

    .link-icon {
      width: 44px; height: 44px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      background: var(--icon-bg, #f0e8d4);
      flex-shrink: 0;
    }

    .link-icon svg {
      width: 22px; height: 22px;
    }

    .link-info {
      flex: 1;
    }
    .link-label {
      font-family: 'Noto Serif TC', serif;
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--ink);
      display: block;
    }
    .link-sub {
      font-size: 0.78rem;
      color: #8a7560;
      margin-top: 0.1rem;
    }

    .link-arrow {
      color: #c5b49a;
      flex-shrink: 0;
    }

    /* LINE */
    .line-card { --brand-color: #06c755; --icon-bg: #e6fded; }
    /* IG */
    .ig-card { --brand-color: #e1306c; --icon-bg: #fde8ef; }
    /* FB */
    .fb-card { --brand-color: #1877f2; --icon-bg: #e8f0fe; }

    /* ── INFO CARD ── */
    .info-card {
      background: linear-gradient(135deg, var(--dark) 0%, #2a1a08 100%);
      border-radius: 12px;
      padding: 1.75rem 1.5rem;
      color: #fff;
      position: relative;
      overflow: hidden;
    }

    .info-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at top right, rgba(200,146,42,0.15), transparent 60%);
    }

    .info-row {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      position: relative;
      padding: 0.85rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .info-row:last-child { border-bottom: none; padding-bottom: 0; }
    .info-row:first-child { padding-top: 0; }

    .info-icon {
      width: 36px; height: 36px;
      background: rgba(200,146,42,0.15);
      border: 1px solid rgba(200,146,42,0.3);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .info-icon svg { width: 18px; height: 18px; color: var(--gold-light); }

    .info-text {
      flex: 1;
    }
    .info-text strong {
      display: block;
      font-family: 'Noto Serif TC', serif;
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      color: var(--gold-light);
      margin-bottom: 0.25rem;
    }
    .info-text p {
      font-size: 0.93rem;
      color: rgba(255,255,255,0.85);
      line-height: 1.5;
    }

    /* ── FOOTER ── */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 1.5rem;
      font-size: 0.75rem;
      color: #a89880;
      border-top: 1px solid var(--paper-dark);
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    header { animation: fadeUp 0.6s ease both; }
    .links-grid { animation: fadeUp 0.6s ease 0.2s both; }
    .info-card { animation: fadeUp 0.6s ease 0.35s both; }
  </style>
</head>
